name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core packages
        run: |
          pnpm -C packages/core build
          pnpm -C packages/vant build
          pnpm -C packages/element-plus build
          pnpm -C packages/ai build

      - name: Build docs
        run: pnpm -C docs build

      - name: Build playground
        run: pnpm -C packages/playground build

      - name: Merge output
        run: |
          mkdir -p _site
          cp -r docs/.vitepress/dist/* _site/
          mkdir -p _site/playground
          cp -r packages/playground/dist/* _site/playground/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
